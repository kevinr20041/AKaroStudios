<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1125">
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#b23a52" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#b23a52" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="envelopeBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf6ec"/>
      <stop offset="100%" stop-color="#ece2cd"/>
    </linearGradient>
    <linearGradient id="flapShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9dfc9"/>
      <stop offset="100%" stop-color="#dccdac"/>
    </linearGradient>
    <linearGradient id="seal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d75872"/>
      <stop offset="100%" stop-color="#8f2c40"/>
    </linearGradient>
  </defs>

  <rect width="900" height="1125" fill="#151210"/>
  <rect width="900" height="1125" fill="url(#glow)"/>

  <!-- decorative corner flourishes -->
  <g stroke="#5a4f42" stroke-width="1.5" fill="none" opacity="0.55">
    <path d="M70,70 h70 M70,70 v70"/>
    <path d="M830,70 h-70 M830,70 v70"/>
    <path d="M70,1055 h70 M70,1055 v-70"/>
    <path d="M830,1055 h-70 M830,1055 v-70"/>
  </g>

  <text x="450" y="215" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="46" fill="#cfc6b6" letter-spacing="1">You're Invited</text>
  <text x="450" y="255" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="16" letter-spacing="6" fill="#8f8574">TOGETHER WITH THEIR FAMILIES</text>

  <!-- envelope, gently rotated -->
  <g transform="translate(450,610) rotate(-4)">
    <rect x="-260" y="-175" width="520" height="350" rx="6" fill="url(#envelopeBody)" stroke="#c9bb9c" stroke-width="2"/>
    <path d="M-260,-175 L0,30 L260,-175" fill="url(#flapShade)" stroke="#c9bb9c" stroke-width="2" stroke-linejoin="round"/>
    <path d="M-260,175 L-40,15 M260,175 L40,15" stroke="#c9bb9c" stroke-width="1.5" opacity="0.7"/>

    <!-- wax seal -->
    <circle cx="0" cy="30" r="54" fill="url(#seal)"/>
    <circle cx="0" cy="30" r="54" fill="none" stroke="#f3c9d2" stroke-width="1" opacity="0.35"/>
    <text x="0" y="46" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="46" fill="#f6e5e9">&amp;</text>
  </g>

  <text x="450" y="945" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15" letter-spacing="5" fill="#8f8574">SATURDAY, THE FIFTH OF SEPTEMBER</text>
  <text x="450" y="978" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15" letter-spacing="5" fill="#8f8574">KILCULLEN &#183; CO. KILDARE</text>
</svg>
