<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1125">
  <defs>
    <radialGradient id="glowTrade" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3f7d6b" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#3f7d6b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="badgeTrade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a9382"/>
      <stop offset="100%" stop-color="#2c5a4d"/>
    </linearGradient>
  </defs>

  <rect width="900" height="1125" fill="#121513"/>
  <rect width="900" height="1125" fill="url(#glowTrade)"/>

  <g stroke="#3f4a45" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M70,70 h70 M70,70 v70"/>
    <path d="M830,70 h-70 M830,70 v70"/>
    <path d="M70,1055 h70 M70,1055 v-70"/>
    <path d="M830,1055 h-70 M830,1055 v-70"/>
  </g>

  <!-- badge -->
  <circle cx="450" cy="470" r="180" fill="url(#badgeTrade)"/>
  <circle cx="450" cy="470" r="180" fill="none" stroke="#bfe4d8" stroke-width="1.5" opacity="0.35"/>

  <!-- silhouette: hard hat + shoulders -->
  <path d="M450,330 c-58,0 -104,46 -104,104 v10 h208 v-10 c0,-58 -46,-104 -104,-104z" fill="#121513"/>
  <rect x="330" y="440" width="240" height="18" rx="9" fill="#121513"/>
  <path d="M355,540 c0,-50 42,-86 95,-86 c53,0 95,36 95,86 v90 h-190z" fill="#121513"/>

  <!-- tool badge: bolt, set at the shoulder -->
  <circle cx="562" cy="560" r="46" fill="#121513" stroke="#dff2ec" stroke-width="2"/>
  <path d="M572,524 l-38,50 h24 l-8,32 l40,-52 h-24z" fill="#dff2ec"/>

  <text x="450" y="740" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="40" fill="#f0ebe1">Trusted trade professionals</text>
  <text x="450" y="780" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#a9b3ac">Electricians, plumbers, builders &amp; more</text>

  <text x="450" y="1000" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15" letter-spacing="5" fill="#7a8b83">WEBSITE CREATION &#183; TRADE &amp; LOCAL BUSINESS</text>
</svg>
