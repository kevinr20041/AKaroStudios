<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1125">
  <defs>
    <radialGradient id="glowW" cx="50%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#b23a52" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#b23a52" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardW" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#211b17"/>
      <stop offset="100%" stop-color="#171310"/>
    </linearGradient>
  </defs>

  <rect width="900" height="1125" fill="#131110"/>
  <rect width="900" height="1125" fill="url(#glowW)"/>

  <!-- email card -->
