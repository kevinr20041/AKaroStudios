  <path d="M429,545 l14,14 l28,-30" fill="none" stroke="#d75872" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="450" y="655" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="42" fill="#f0ebe1">Welcome to the family</text>

  <text x="450" y="705" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#bdb4a4">We&#8217;re so glad you&#8217;re here. Here&#8217;s everything</text>
  <text x="450" y="730" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#bdb4a4">you need to get started, plus a little gift.</text>

  <rect x="345" y="765" width="210" height="52" rx="26" fill="#b23a52"/>
  <text x="450" y="798" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#f5f1e8">Get Started</text>

  <text x="450" y="990" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15" letter-spacing="5" fill="#8f8574">EMAIL MARKETING &#183; WELCOME FLOW</text>
